# fly.toml app configuration file generated for note-tool on 2026-07-07T16:13:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'note-tool'
primary_region = 'arn'

[build]
[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
